  const v = parseFloat(cost);

  if(v <= 100)  return 'B'; // ₹40L – ₹1 Cr
  if(v <= 500)  return 'C'; // ₹1 Cr – ₹5 Cr
  return 'D';               // above ₹5 Cr
}

function randomHex(n) { return Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b => b.toString(16).padStart(2,'0')).join(''); }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtCost(v){ const n=parseFloat(v); return Number.isFinite(n)&&n>0?'&#8377;'+n.toFixed(2)+'L':'&mdash;'; }
function numVal(v){ const n=parseFloat(v); return Number.isFinite(n)?n:0; }
function fmtAmt(n){ const v=Number.isFinite(n)?n:0; return '&#8377;'+v.toFixed(2)+'L'; }
function toast(msg,err){ const t=document.getElementById('toast'); t.innerHTML=msg; t.className='toast'+(err?' err':''); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

function checked(id){ const el = document.getElementById(id); return el ? el.checked : false; }
function trimVal(id){ return val(id).trim(); }
function av(code,large){
  const sz=large?'width:40px;height:40px;font-size:13px':'';
  if(!code) return '<span class="av NA" style="'+sz+'">&ndash;</span>';
  const knownClasses=['PP','CK','JAB','SSH','UK','PT','RM','GM','NA'];
  if(knownClasses.includes(code)) return '<span class="av '+code+'" style="'+sz+'">'+code+'</span>';
  const c = paletteFor(code);
  return '<span class="av" style="'+sz+';background:'+c.bg+';color:'+c.fg+'">'+code+'</span>';
}

function onLoginOfficer(){ const code=document.getElementById('login-code').value; const pinEl=document.getElementById('login-pin'); pinEl.disabled=!code; pinEl.value=''; document.getElementById('login-error').textContent=''; if(code) setTimeout(()=>pinEl.focus(),50); }
function doLogin(){
  const loc=document.getElementById('login-loc').value; const code=document.getElementById('login-code').value; const pin=document.getElementById('login-pin').value; const err=document.getElementById('login-error');
  if(!loc){ err.textContent='Select a location.'; return; } if(!code){ err.textContent='Select your officer / area.'; return; } if(!pin){ err.textContent='Enter your PIN.'; return; } err.textContent='';
  if(LOCAL_PINS[code]===undefined||pin!==LOCAL_PINS[code]){ err.textContent='Incorrect PIN.'; return; }
  const token=randomHex(32); const expires=new Date(Date.now()+TOKEN_TTL_MS).toISOString();
  sessionToken=token; currentUser=code; const isArea=loc==='area'; currentIsArea=isArea; currentPage=currentIsArea?currentUser:'summary';
  sessionStorage.setItem(TOKEN_KEY,JSON.stringify({token,user:code,expires,isArea}));
  document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='block';
  renderNavUser(); initApp();
}
function tryRestoreSession(){
  const saved=sessionStorage.getItem(TOKEN_KEY); if(!saved) return false;
  try{ const {token,user,expires,isArea}=JSON.parse(saved); if(expires&&new Date(expires)>new Date()){ sessionToken=token; currentUser=user; currentIsArea=!!isArea; currentPage=currentIsArea?currentUser:'summary'; document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='block'; renderNavUser(); initApp(); return true; } }catch(e){}
  sessionStorage.removeItem(TOKEN_KEY); return false;
}

function logout(){ if(refreshTimer) clearInterval(refreshTimer); sessionToken=null; currentUser=null; currentIsArea=false; currentPage='summary'; sessionStorage.removeItem(TOKEN_KEY); document.getElementById('app').style.display='none'; document.getElementById('login-screen').style.display='flex'; document.getElementById('login-pin').value=''; document.getElementById('login-code').value=''; document.getElementById('login-loc').value=''; onLoginLoc(); }

async function sbFetch(path,opts={}){ const url=SB_URL+'/rest/v1/'+path; const headers={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',...(opts.extraHeaders||{})}; if(opts.prefer) headers['Prefer']=opts.prefer; const res=await fetch(url,{method:opts.method||'GET',headers,body:opts.body,signal:opts.signal}); if(opts.rawRes) return res; if(res.status===204||res.status===201) return null; const text=await res.text(); return text?JSON.parse(text):null; }
function setSyncStatus(state,msg){ document.getElementById('sync-dot').className='sync-dot'+(state==='ok'?'':state==='err'?' err':' syncing'); document.getElementById('sync-txt').innerHTML=msg; }
async function safeFetch(table,query){ try{ const res=await sbFetch(table+(query?'?'+query:''),{rawRes:true}); if(res.status===404||res.status===400||res.status===406){ if(!_missingTables.includes(table)) _missingTables.push(table); return []; } if(!res.ok) throw new Error('HTTP '+res.status); _missingTables=_missingTables.filter(t=>t!==table); const txt=await res.text(); return txt?JSON.parse(txt):[]; }catch(e){ throw e; } }
async function checkMigrationStatus(){
  // Probe by explicitly selecting the v17 columns. If they don't exist yet,
  // PostgREST returns 400 (PGRST204 / unknown column) instead of 200.
  const probes=[
    sbFetch('pipeline_projects?select=project_full,vip_ref,stale&limit=1',{rawRes:true}),
    sbFetch('efile_projects?select=project_full,vip_ref,stale&limit=1',{rawRes:true}),
    sbFetch('mou_projects?select=project_full,vip_ref,stale&limit=1',{rawRes:true}),
    sbFetch('active_projects?select=project_full,vip_ref,fin_year,mou_execution_date,exp_current_month,exp_current_fy,exp_cumulative,exp_remain_forecast,mou_extended,district,progress_status,block,panchayat,total_beneficiaries,sc_beneficiaries,st_beneficiaries,obc_beneficiaries,sch_vii_item,project_duration_months,within_25km,project_abstract,execution&limit=1',{rawRes:true})
  ];
  try{
    const results=await Promise.all(probes);
    const allOk=results.every(r=>r.ok);
    _migrationStatus = allOk ? 'done' : 'pending';
  }catch(e){
    _migrationStatus = 'pending';
  }
}

function resolveStages(type, cost){ if(type==='efile') return getEfileStages(cost); return TRACKS[type] ? TRACKS[type].stages : []; }
function getStageBadgeClass(type, stageId, cost){ const stages = resolveStages(type, cost); const s = stages.find(x=>x.id===stageId); return s ? s.badge : ''; }
function getStageLabel(type, stageId, cost){ const stages = resolveStages(type, cost); const s = stages.find(x=>x.id===stageId); return s ? stageId+'. '+s.label : 'Stage '+stageId; }
function stageBadge(type, stage, note, hold, cost){ if(hold) return '<span class="badge bhold">On hold</span>'; return '<span class="badge '+getStageBadgeClass(type,stage,cost)+'">'+getStageLabel(type,stage,cost)+'</span>'+(note?'<br><span style="font-size:10px;color:var(--muted);margin-top:2px;display:block">'+esc(note)+'</span>':''); }
function stageFlow(type, currentStage, cost){
  const stages = resolveStages(type, cost); const track = TRACKS[type]; if(!track) return '';
  let h='<div class="stage-flow">';
  stages.forEach((s,i)=>{
    const isDone=s.id<currentStage; const isCurrent=s.id===currentStage; const cls=isDone?'done':isCurrent?'current':'';
    const style=isCurrent?'background:'+track.bg+';color:'+track.color+';box-shadow:0 0 0 2px '+track.color:isDone?'background:#e5e7eb;color:#374151':'';
    h+='<span class="sf-step '+cls+'" style="'+style+'">'+s.label+'</span>';
    if(i<stages.length-1) h+='<span class="sf-arrow">›</span>';
  });
  return h+'</div>';
}

        }).join('') : (()=>{ const row=OFFICERS.map(o=>arr.filter(p=>p.officer===o.code).length); const offTot=row.reduce((a,b)=>a+b,0); const grandTot=arr.length; return '<tr><td>All</td>'+row.map(c=>'<td style="text-align:center">'+(c?'<strong>'+c+'</strong>':'<span style="color:#e5e7eb">&middot;</span>')+'</td>').join('')+'<td style="text-align:center;font-weight:700">'+(offTot||'&mdash;')+'</td><td style="text-align:center;font-weight:700;color:var(--muted)">'+(grandTot||'&mdash;')+'</td></tr>'; })())
        +'</tbody></table></div>';
    }
    h+='</div>';
  });
  return h+'<p style="font-size:11px;color:var(--muted);margin-top:4px">*Grand total includes Area-office items not shown in this HQ-only matrix — see the 🏘️ Areas tab.</p></div></div>';
}

function getAreaTable(){ return 'area_projects'; }
function getAreaProjects(areaCode){ return DB.areaProjects.filter(p=>p.areaCode===areaCode); }
function getAreaTrack(trackId){ return AREA_TRACKS.find(t=>t.id===trackId)||AREA_TRACKS[0]; }

async function persistAreaRow(item){
  showSaving(true);
  try{
    const base={
      id:item.id, area_code:item.areaCode, track:item.track, stage:item.stage||'',
      project:item.project||'', project_full:item.projectFull||'', agency:item.agency||'',
      cost:item.cost||'', district:item.district||'', efile_no:item.efileNo||'',
      mou_start:item.mouStart||'', mou_end:item.mouEnd||'', mou_execution_date:item.mouExec||'',
      fin_year:item.finYear||'', exp_current_month:item.expMonth||'', exp_current_fy:item.expFy||'',
      exp_cumulative:item.expCum||'', exp_remain_forecast:item.expRemainForecast||'',
      mou_extended:item.mouExt||'', remark:item.remark||'', completed_date:item.completedDate||'',
      vip_ref:item.vipRef||''
    };
    const res=await sbFetch('area_projects',{method:'POST',prefer:'resolution=merge-duplicates,return=minimal',body:JSON.stringify(base),rawRes:true});
    if(res.status!==200&&res.status!==201&&res.status!==204) throw new Error('HTTP '+res.status);
    setSyncStatus('ok','Saved · '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    toast('Saved successfully');
  }catch(e){ setSyncStatus('err','Save failed'); toast('Could not save: '+e.message,true); }
  finally{ showSaving(false); }
}

async function removeAreaRow(id){
  showSaving(true,'Deleting...');
  try{
    const res=await sbFetch('area_projects?id=eq.'+encodeURIComponent(id),{method:'DELETE',rawRes:true});
    if(res.status!==200&&res.status!==204) throw new Error('HTTP '+res.status);
    DB.areaProjects=DB.areaProjects.filter(p=>String(p.id)!==String(id));
    setSyncStatus('ok','Deleted · '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){ toast('Could not delete.',true); throw e; }
  finally{ showSaving(false); }
}

function autoTransitionAreaProject(item){
  // TCR Approved → Track 3, stage reset
  if(item.track===2 && item.stage===AREA_TRACK_AWARD_TRIGGER){
    item.track=3; item.stage='Pending BC Submission';
  }
  // Final Bill Paid / Work Completed → Track 5 (Completed)
  if(item.track===4 && AREA_TRACK_COMPLETED_STAGES.includes(item.stage)){
    item.track=5; item.completedDate=new Date().toISOString().slice(0,10);
  }
  return item;
}

  const track=getAreaTrack(parseInt(trackId)||1);

  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-bg').classList.add('open');

    html+=`<div class="frow"><div class="fg"><label>MoU Extended Upto</label><input type="text" id="m-mou-ext" value="${esc(item.mouExt||'')}" ${dis}></div><div class="fg"><label>VIP Reference</label><input type="text" id="m-vipref" value="${esc(item.vipRef||'')}" ${dis}></div></div>`;
  }
  html+=`<div class="fg"><label>Remarks</label><textarea id="m-remark" ${dis}>${esc(item.remark||'')}</textarea></div>`;
  html+='<div class="modal-actions">';
  if(isEdit&&!isCompleted) html+=`<button class="btn btn-del" onclick="delAreaItem('${item.id}')">Delete</button>`;
  html+=`<button class="btn btn-ghost" onclick="closeModal()">${isEdit?'Close':'Cancel'}</button>`;
  if(!isCompleted) html+=`<button class="btn btn-acc" onclick="${isEdit?`saveAreaEdit('${item.id}')`:'saveAreaNew()'}">Save</button>`;

}

function saveAreaEdit(id){
  const idx=DB.areaProjects.findIndex(p=>String(p.id)===String(id));
  if(idx<0) return;
  const p=DB.areaProjects[idx];
  const stageEl=document.getElementById('m-area-stage');
  const newStage=stageEl?stageEl.value:p.stage;
  DB.areaProjects[idx]={...p,

    projectFull:(document.getElementById('m-project-full')||{}).value?.trim()||'',
    agency:(document.getElementById('m-agency')||{}).value?.trim()||'',

    vipRef:(document.getElementById('m-vipref')||{}).value?.trim()||'',
    remark:(document.getElementById('m-remark')||{}).value?.trim()||'',
    stage:newStage
  };
  DB.areaProjects[idx]=autoTransitionAreaProject(DB.areaProjects[idx]);
  persistAreaRow(DB.areaProjects[idx]);
  closeModal();
  showPage(currentUser);
}

function areaAdvanceStage(id){
  const idx=DB.areaProjects.findIndex(p=>String(p.id)===String(id));
  if(idx<0) return;
  const item=DB.areaProjects[idx];
  if(item.track===5) return; // locked
  const track=getAreaTrack(item.track);
  const si=track.stages.indexOf(item.stage);
  if(si>=0 && si<track.stages.length-1){
    item.stage=track.stages[si+1];
  }
  DB.areaProjects[idx]=autoTransitionAreaProject(item);
  persistAreaRow(DB.areaProjects[idx]);
  toast('Advanced to: '+DB.areaProjects[idx].stage);
  showPage(currentUser);
}

async function delAreaItem(id){
  if(!confirm('Delete this project permanently?')) return;
  await removeAreaRow(id);
  closeModal();
  toast('Entry deleted');
  showPage(currentUser);
}

/* Area Monthly Report Export — 2-sheet Excel */
function exportAreaMonthlyReport(areaCode){
  withXLSX(XLSX=>{
    const area=AREAS.find(a=>a.code===areaCode);
    const projects=getAreaProjects(areaCode);
    const wb=XLSX.utils.book_new();

    // Sheet 1: New Activities (Track 1,2,3)
    const newHeads=['S.No.','Project Name','Project Name (Full)','Agency','District','Cost (₹ Lakhs)','E-File No.','Track','Stage','Remarks'];
    const newRows=projects.filter(p=>p.track>=1&&p.track<=3).map((p,i)=>[
      i+1, p.project||'', p.projectFull||'', p.agency||'', p.district||'',
      p.cost||'', p.efileNo||'', getAreaTrack(p.track).label, p.stage||'', p.remark||''
    ]);
    XLSX.utils.book_append_sheet(wb, makeSheet(XLSX,newHeads,newRows), 'New Activities');

    // Sheet 2: Commenced Activities (Track 4 & 5)
    const commHeads=['S.No.','Fin. Year','Date of Execution','Project Name','Project Name (Full)','E-File No.',
      'Value (₹ Lakhs)','Agency','Exp. (Current Month)','Exp. (Current FY)',
      'Cum. Exp. (till 31-Mar)','Expected Exp. (Rem. FY)','MoU From','MoU To',
      'MoU Extended Upto','District','Stage/Status','Remarks'];
    const commRows=projects.filter(p=>p.track>=4).map((p,i)=>[
      i+1, p.finYear||'', p.mouExec||'', p.project||'', p.projectFull||'', p.efileNo||'',
      p.cost||'', p.agency||'', p.expMonth||'', p.expFy||'', p.expCum||'',
      p.expRemainForecast||'', p.mouStart||'', p.mouEnd||'', p.mouExt||'',
      p.district||'', p.stage||'', p.remark||''
    ]);
    XLSX.utils.book_append_sheet(wb, makeSheet(XLSX,commHeads,commRows), 'Commenced Activities');

    const mn=new Date().toLocaleString('en-IN',{month:'short',year:'numeric'}).replace(' ','-');
    XLSX.writeFile(wb,'CCL_CSR_'+areaCode+'_Monthly_'+mn+'.xlsx');
  });
}

function getVipDignitaries(){ const allItems=[...DB.pipeline,...DB.efiles,...DB.mous,...DB.active]; const map={}; allItems.forEach(p=>{ if(!p.vipRef) return; if(!map[p.vipRef]) map[p.vipRef]={name:p.vipRef,pipeline:0,efile:0,mou:0,active:0,holdCount:0,cost:0}; map[p.vipRef][p.type]++; if(p.hold) map[p.vipRef].holdCount++; const c=parseFloat(p.cost); if(Number.isFinite(c)) map[p.vipRef].cost+=c; }); return Object.values(map).sort((a,b)=>(b.pipeline+b.efile+b.mou+b.active)-(a.pipeline+a.efile+a.mou+a.active)); }

/* ══════════════════════════════════════════
   EXPENDITURE MONITOR
   Row 1 = HQ (combined total of all 7 HQ officers' Active Projects).
   Rows 2-16 = the 15 Area offices.
   Col4 = expenditure booked till 31-Mar-2026 (prior-FY closing balance, expCum).
   Col5 = Col3 (Cost) − Col4.
   Col6 = expenditure booked so far in the current FY (expFy).
   Col7 = officer-entered forecast for remaining FY (expRemainForecast).
   Col8 = Col6 + Col7.
   ══════════════════════════════════════════ */
function calcExpRow(items){
  const count=items.length;
  const cost=items.reduce((s,p)=>s+numVal(p.cost),0);
  const expCum=items.reduce((s,p)=>s+numVal(p.expCum),0);
  const remaining=cost-expCum;
  const expFy=items.reduce((s,p)=>s+numVal(p.expFy),0);
  const forecast=items.reduce((s,p)=>s+numVal(p.expRemainForecast),0);
  const annual=expFy+forecast;
  return {count,cost,expCum,remaining,expFy,forecast,annual};
}
function getExpenditureRows(){
  const hqCodes=new Set(OFFICERS.map(o=>o.code));
  const rows=[{code:'HQ',name:'HQ (All 7 Officers)',items:DB.active.filter(p=>hqCodes.has(p.officer))}];
  AREAS.forEach(a=>{ rows.push({code:a.code,name:a.name,items:DB.active.filter(p=>p.officer===a.code)}); });
  return rows.map(r=>({...r,...calcExpRow(r.items)}));
}
function selectExpArea(code){ window._selectedExpArea=code; showPage('expenditure'); }
function expStat(cls,label,val){ return '<div class="stat '+cls+'"><div class="lbl">'+esc(label)+'</div><div class="val" style="font-size:18px">'+val+'</div></div>'; }

  let html='<div class="page active"><div class="page-header"><div><h1>💰 Expenditure Monitor</h1><p>Active Projects expenditure &middot; HQ + all 15 Areas &middot; FY 2026-27</p></div><div class="page-header-actions"><button class="btn btn-ghost" onclick="initApp()">&#8635; Refresh</button></div></div>';

  html+='<div class="section"><div class="sec-hdr"><span class="sec-title">Expenditure by HQ &amp; Area</span><span class="sec-sub">16 rows &middot; figures in &#8377; Lakhs</span></div><div class="tw"><table><thead><tr><th>#</th><th>HQ / Area</th><th>Active Projects</th><th>Project Cost</th><th>Exp. Booked (till 31-Mar)</th><th>Exp. Remaining</th><th>Exp. Booked (Current FY)</th><th>Expected Exp. (Rem. FY)</th><th>Annual Expected Exp.</th></tr></thead><tbody>'

          return '<tr><td style="color:var(--muted);font-size:11px">'+(i+1)+'</td><td class="pname">'+esc(p.project)+(p.projectFull?'<div class="text-xs" style="color:var(--muted);font-weight:400;margin-top:2px" title="'+esc(p.projectFull)+'">'+esc(p.projectFull.length>60?p.projectFull.slice(0,60)+'…':p.projectFull)+'</div>':'')+'</td>'

            +'<td class="cost">'+fmtAmt(cost)+'</td><td class="cost">'+fmtAmt(expCum)+'</td><td class="cost" style="'+(remaining<0?'color:var(--red);font-weight:600':'')+'">'+fmtAmt(remaining)+'</td><td class="cost">'+fmtAmt(expFy)+'</td><td class="cost">'+fmtAmt(forecast)+'</td><td class="cost" style="font-weight:700">'+fmtAmt(annual)+'</td></tr>';

function exportReportingXLSX(){

    const officerCodes=new Set(OFFICERS.map(o=>o.code));
    const allItems=[...DB.pipeline,...DB.efiles,...DB.mous,...DB.active].filter(p=>!p.hold).filter(p=>!p.officer||officerCodes.has(p.officer));

    const efileH=['Project','Project Name (Full)','Agency','Reference','E-File No.','Cost (Lakhs)','Cost Band','AP Flag','Stage','Stage Note','On Hold','VIP Reference','Remark'];
    const mouH=['Project','Project Name (Full)','Agency','Reference','Cost (Lakhs)','AP Flag','Stage','Stage Note','On Hold','VIP Reference','Remark'];
    const toBaseRows=(arr,trackId)=>arr.map(p=>[p.project||'',p.projectFull||'',p.agency||'',p.ref||'',p.cost||'',p.apFlag||'',getStageLabel(trackId,p.stage,p.cost),p.stageNote||'',p.hold?'Yes':'No',p.vipRef||'',p.remark||'']);
    const toEfileRows=arr=>arr.map(p=>[p.project||'',p.projectFull||'',p.agency||'',p.ref||'',p.efileNo||'',p.cost||'','Band '+getEfileBandKey(p.cost),p.apFlag||'',getStageLabel('efile',p.stage,p.cost),p.stageNote||'',p.hold?'Yes':'No',p.vipRef||'',p.remark||'']);
    XLSX.utils.book_append_sheet(wb,makeSheet(XLSX,pipeH,toBaseRows(pipeline,'pipeline')),'Pipeline');
    XLSX.utils.book_append_sheet(wb,makeSheet(XLSX,efileH,toEfileRows(efiles)),'E-Files');
    XLSX.utils.book_append_sheet(wb,makeSheet(XLSX,mouH,toBaseRows(mous,'mou')),'MoU');
    XLSX.utils.book_append_sheet(wb,makeSheet(XLSX,activeHeads,toActiveRows(active)),'Active Projects');
    XLSX.writeFile(wb,'CCL_CSR_'+code+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
  });
}

function exportVipXLSX(){
  withXLSX(XLSX=>{
    const allItems=[...DB.pipeline,...DB.efiles,...DB.mous,...DB.active].filter(p=>p.vipRef);
    const wb=XLSX.utils.book_new();
    const heads=['VIP Reference','Track','Project','Project Name (Full)','Agency','Officer','Cost (Lakhs)','Stage/Status','Remark'];
    const rows=allItems.map(p=>[p.vipRef||'',TRACKS[p.type].label,p.project||'',p.projectFull||'',p.agency||'',officerLabel(p.officer),p.cost||'',p.type==='active'?(p.progStatus||'Active'):getStageLabel(p.type,p.stage,p.cost),p.remark||'']);
    rows.sort((a,b)=>a[0].localeCompare(b[0]));
    XLSX.utils.book_append_sheet(wb,makeSheet(XLSX,heads,rows),'VIP Projects');
    XLSX.writeFile(wb,'CCL_CSR_VIP_Projects_'+new Date().toISOString().slice(0,10)+'.xlsx');
  });
}
